{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · sideload{{end}}</title>
  <meta name="theme-color" content="#fafaf7">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    .container { max-width: 56rem; }

    .summary {
      display: flex; flex-wrap: wrap; gap: 0.4rem 1.5rem;
      margin: 0.6rem 0 1.5rem;
      font: 0.78rem/1 var(--font-mono); opacity: 0.65;
    }

    /* app list — one clear row per application */
    .app-list { border-top: 1px solid var(--hairline); margin-top: 1rem; }
    .app-row {
      display: flex; align-items: baseline; gap: 0.4rem 1rem; flex-wrap: wrap;
      padding: 0.85rem 0.2rem;
      border-bottom: 1px solid var(--hairline);
      text-decoration: none; color: inherit;
    }
    .app-row:hover { background: #f2f0ea; }
    .app-row .name { font-weight: 500; font-size: 1rem; }
    .app-row .bundle {
      font: 0.74rem/1 var(--font-mono); opacity: 0.55; word-break: break-all;
    }
    .app-row .ver {
      margin-left: auto; font: 0.78rem/1 var(--font-mono); opacity: 0.7;
      white-space: nowrap;
    }
    .app-row .count {
      font: 0.72rem/1 var(--font-mono); opacity: 0.5; white-space: nowrap;
    }

    /* meta line — mono facts under a heading */
    .meta {
      display: flex; flex-wrap: wrap; gap: 0.3rem 1.1rem; align-items: baseline;
      margin-top: 0.5rem;
      font: 0.78rem/1.5 var(--font-mono); opacity: 0.7;
    }
    .meta .cid { word-break: break-all; }

    /* expiry banner */
    .banner {
      margin: 1.1rem 0; padding: 0.7rem 0.9rem;
      border: 1px solid var(--hairline);
      font: 0.82rem/1.4 var(--font-mono);
    }
    .banner.ok     { border-color: var(--hairline); }
    .banner.warn   { border-color: var(--accent); color: var(--accent); }
    .banner.danger { border-color: var(--accent); color: var(--accent);
                     background: #fbeee8; }

    /* the install action — the cable-killer, a big tap target */
    .install {
      display: flex; flex-wrap: wrap; align-items: center; gap: 1.5rem;
      margin: 1.5rem 0; padding: 1.4rem;
      border: 1px solid var(--ink);
    }
    .install .lede { flex: 1 1 16rem; min-width: 0; }
    .install-btn {
      display: inline-block; padding: 0.85rem 1.6rem;
      background: var(--ink); color: var(--surface);
      border: 1px solid var(--ink);
      font: 500 0.95rem/1 var(--font-mono);
      text-decoration: none; text-align: center;
    }
    .install-btn:hover { background: var(--surface); color: var(--ink); }
    .install .qr { flex: 0 0 auto; width: 9rem; height: 9rem; }
    .install .qr svg { width: 100%; height: 100%; display: block; }
    .install .qr-cap {
      margin-top: 0.4rem; text-align: center;
      font: 0.68rem/1.2 var(--font-mono); opacity: 0.55;
    }
    @media (max-width: 36rem) { .install .qr-wrap { display: none; } }

    /* share / management forms */
    .panel {
      margin: 1.6rem 0; padding: 1.1rem 1.2rem;
      border: 1px solid var(--hairline);
    }
    .panel h2 { font-size: 0.95rem; margin: 0 0 0.6rem; }
    .inline-form {
      display: flex; flex-wrap: wrap; gap: 0.6rem 1rem; align-items: flex-end;
    }
    .inline-form .field { margin: 0; }
    .inline-form select, .inline-form input[type="text"] {
      width: auto; padding: 0.3rem 0.5rem; font: 0.82rem var(--font-mono);
    }
    .inline-form button { padding: 0.4rem 1rem; font-size: 0.85rem; }

    /* shown-once share confirmation */
    .share-row {
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.3rem 1rem;
      padding: 0.6rem 0; border-top: 1px solid var(--hairline);
    }
    .share-row:last-of-type { border-bottom: 1px solid var(--hairline); }
    .share-row > .label { flex: 0 0 6rem; margin: 0; display: block; }
    .share-row code {
      flex: 1 1 16rem; min-width: 0;
      font-size: 0.8rem; word-break: break-all; user-select: all;
    }

    /* management tables */
    table.admin { font-size: 0.85rem; }
    table.admin td.mono, table.admin td.num {
      font-family: var(--font-mono); font-size: 0.78rem; opacity: 0.75;
    }
    table.admin td { vertical-align: middle; }
    table.admin td.actions form { display: inline; margin: 0; }
    table.admin td.actions button {
      border: 0; background: transparent; padding: 0;
      color: var(--accent); text-decoration: underline;
      text-underline-offset: 0.2em; font: 0.78rem/1.3 var(--font-mono);
      cursor: pointer;
    }
    .pill {
      display: inline-block; padding: 0.05rem 0.45rem;
      border: 1px solid var(--hairline);
      font: 0.68rem/1.4 var(--font-mono); text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pill.live { border-color: var(--ink); }
    .pill.dead { opacity: 0.5; }
    .pill.ok { border-color: var(--ink); }
    .pill.pending { border-color: var(--accent); color: var(--accent); }

    .back { font: 0.78rem/1 var(--font-mono); opacity: 0.6; }

    /* rendered markdown (descriptions, changelogs) */
    .markdown { font-size: 0.92rem; line-height: 1.6; }
    .markdown > :first-child { margin-top: 0; }
    .markdown > :last-child { margin-bottom: 0; }
    .markdown p { margin: 0.6rem 0; }
    .markdown ul, .markdown ol { margin: 0.6rem 0; padding-left: 1.4rem; }
    .markdown li { margin: 0.2rem 0; }
    .markdown a { color: var(--accent); }
    .markdown code {
      font: 0.85em var(--font-mono); background: #f2f0ea;
      padding: 0.05em 0.35em; border-radius: 2px;
    }
    .markdown h2, .markdown h3 { font-size: 1rem; margin: 1rem 0 0.4rem; }

    /* tagline under the app title */
    .tagline { font-size: 1rem; margin: 0.3rem 0 0; opacity: 0.85; }

    /* screenshots gallery — horizontal scroll of phone shots */
    .shots {
      display: flex; gap: 0.8rem; overflow-x: auto;
      margin: 1.2rem 0; padding-bottom: 0.5rem;
      scroll-snap-type: x mandatory;
    }
    .shot { flex: 0 0 auto; scroll-snap-align: start; }
    .shot img {
      display: block; height: 22rem; width: auto; max-width: 90vw;
      border: 1px solid var(--hairline); background: #f2f0ea;
    }
    .shot figcaption {
      margin-top: 0.35rem; max-width: 12rem;
      font: 0.72rem/1.3 var(--font-mono); opacity: 0.6;
    }

    /* version cards (with changelog) */
    .versions { margin-top: 1.4rem; }
    .vcard {
      border: 1px solid var(--hairline); padding: 0.9rem 1rem;
      margin-bottom: 0.7rem;
    }
    .vcard .vhead {
      display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.3rem 1rem;
    }
    .vcard .vver { font-weight: 500; }
    .vcard .vmeta {
      margin-left: auto; display: flex; flex-wrap: wrap; gap: 0.2rem 0.9rem;
      font: 0.74rem/1.4 var(--font-mono); opacity: 0.65;
    }
    .vcard .vactions { display: flex; gap: 1rem; margin-top: 0.5rem; }
    .vcard .vactions a, .vcard .vactions button {
      font: 0.78rem/1.3 var(--font-mono); color: var(--accent);
      text-decoration: underline; text-underline-offset: 0.2em;
      border: 0; background: transparent; padding: 0; cursor: pointer;
    }
    .vcard .vactions form { margin: 0; display: inline; }
    .vcard .changelog { margin-top: 0.6rem; }

    /* screenshot manager (edit page) */
    .shot-manage {
      display: grid; gap: 0.8rem;
      grid-template-columns: repeat(auto-fill, minmax(13rem, 1fr));
      margin: 1rem 0;
    }
    .shot-manage figure {
      margin: 0; border: 1px solid var(--hairline); padding: 0.6rem;
    }
    .shot-manage img {
      display: block; width: 100%; height: 9rem; object-fit: contain;
      background: #f2f0ea;
    }
    .shot-manage .row {
      display: flex; gap: 0.5rem; align-items: center; margin-top: 0.5rem;
    }
    .shot-manage input[type="text"] { flex: 1; font-size: 0.8rem; padding: 0.25rem 0.4rem; }
    .shot-manage button { font-size: 0.75rem; padding: 0.2rem 0.5rem; }
    .shot-manage .ord button { border: 0; background: transparent; color: var(--ink);
      padding: 0 0.2rem; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "topbar"}}
<header class="bar">
  <h1><a href="/">farfield · sideload</a></h1>
  <nav>
    <a href="/">Builds</a>
    <a href="/shares">Shares</a>
    <a href="/logout">Log out</a>
  </nav>
</header>
{{end}}
