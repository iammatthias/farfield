{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>{{.Title}}</title>
<link rel="stylesheet" href="/static/styles.css?v=20260602-1">
<link rel="stylesheet" href="style.css?v=20260602-docs4">
</head>
<body>
<input type="checkbox" id="nav-toggle" class="nav-toggle" hidden>
<header class="bar">
  <a href="/" class="brand">farfield · docs</a>
  <label for="nav-toggle" class="nav-burger" aria-label="Toggle navigation"><span></span></label>
</header>
<div class="docs-layout">
<aside class="sidebar">
  <nav class="docs-nav" aria-label="Docs navigation">
  {{- range .Nav}}
  <a href="{{.Href}}"{{if eq .Key $.Active}} aria-current="page"{{end}}>{{.Label}}</a>
  {{- end}}
</nav>
  </aside>

<main class="page">
{{- block "content" .}}{{end}}
</main>
</div>
</body>
</html>{{end}}
