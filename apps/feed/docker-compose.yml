# Local-dev compose for the feed app. Run from the repo root so Compose
# interpolates ${...} from the root .env:
#   docker compose -f apps/feed/docker-compose.yml up --build
services:
  feed:
    build:
      context: ../..
      dockerfile: apps/feed/Dockerfile
    ports:
      - "${FEED_PORT:-8788}:8788"
    environment:
      - HOST=0.0.0.0
      - FEED_PORT=8788
      - FEED_DB_PATH=/data/feed.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - FEED_API_KEY=${FEED_API_KEY:-}
      - COOKIE_SECURE=false
    volumes:
      - feed-data:/data
    restart: unless-stopped

volumes:
  feed-data:
