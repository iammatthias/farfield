{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · feed{{end}}</title>
  <meta name="theme-color" content="#fafaf7">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    .container { max-width: 46rem; }

    /* feed — a ruled stream of dated notes */
    .post { padding: 1.4rem 0; border-bottom: 1px solid var(--hairline); }
    .post:last-child { border-bottom: 0; }
    .post-meta {
      display: flex; gap: 0.85rem; flex-wrap: wrap; align-items: baseline;
      margin-bottom: 0.5rem;
      font-family: var(--font-mono); font-size: 0.75rem;
    }
    .post-meta .when {
      text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.55;
    }
    .post-meta .tag { opacity: 0.55; }
    .post-body { white-space: pre-wrap; word-break: break-word; }
    .post-actions {
      display: flex; gap: 1.25rem; margin-top: 0.8rem;
      font-family: var(--font-mono); font-size: 0.78rem;
    }
    .post-actions form { display: inline; }
    .post-actions button {
      border: 0; background: transparent; padding: 0;
      color: var(--accent); text-decoration: underline;
      text-underline-offset: 0.2em; font: inherit;
    }
    .post-actions button:hover { background: transparent; text-decoration-thickness: 2px; }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "topbar"}}
<header class="bar">
  <h1><a href="/">farfield · feed</a></h1>
  <nav>
    <a href="/new">New post</a>
    <a href="/logout">Log out</a>
  </nav>
</header>
{{end}}
