{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · feed{{end}}</title>
  <meta name="theme-color" content="#121113">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    .container { max-width: 44rem; }

    header.bar { display:flex; justify-content:space-between; align-items:baseline;
      gap:1rem 1.5rem; flex-wrap:wrap; margin-bottom:1.5rem;
      padding-bottom:1rem; border-bottom:1px solid var(--border); }
    header.bar h1 { font-size:1.05rem; margin:0; }
    header.bar h1 a { color:var(--text); text-decoration:none; }
    nav.links { display:flex; gap:1.25rem; flex-wrap:wrap; }

    .post { border:1px solid var(--border); border-radius:var(--radius);
      padding:1rem 1.15rem; margin:0.85rem 0; background:var(--surface); }
    .post-meta { display:flex; gap:0.65rem; align-items:baseline;
      flex-wrap:wrap; font-size:0.8rem; margin-bottom:0.5rem; }
    .post-meta .when { color:var(--muted); }
    .tag { color:var(--muted); }
    .post-body { white-space:pre-wrap; word-break:break-word; }
    .post-actions { display:flex; gap:0.85rem; align-items:center;
      margin-top:0.75rem; font-size:0.85rem; }

    .field { margin:1rem 0; }
    .field label { display:block; color:var(--muted); font-size:0.85rem; margin-bottom:0.3rem; }
    .field input[type=text], .field input[type=password], .field textarea { width:100%; }
    .field textarea { min-height:9rem; font-family:var(--mono); font-size:0.88rem; line-height:1.55; }
    .field .hint { color:var(--muted); font-size:0.78rem; margin-top:0.3rem; }
    .actions { display:flex; gap:1rem; align-items:center; margin-top:1.25rem; flex-wrap:wrap; }
    .danger { background:transparent; color:var(--error); border-color:var(--error); }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "topbar"}}
<header class="bar">
  <h1><a href="/">farfield · feed</a></h1>
  <nav class="links">
    <a href="/new">New post</a>
    <a href="/logout">Log out</a>
  </nav>
</header>
{{end}}
