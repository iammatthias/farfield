{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · keys{{end}}</title>
  <meta name="theme-color" content="#fafaf7">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    .container { max-width: 60rem; }

    table.admin { font-size: 0.85rem; }
    table.admin td { vertical-align: middle; }
    table.admin td.mono {
      font-family: var(--font-mono); font-size: 0.78rem; opacity: 0.7;
      white-space: nowrap;
    }
    table.admin td.actions {
      display: table-cell;
      margin-top: 0;
      font: 0.78rem/1.3 var(--font-mono);
      white-space: nowrap;
      vertical-align: middle;
    }
    table.admin td.actions form { display: inline-flex; align-items: baseline; margin: 0 0 0 0.6rem; }
    table.admin td.actions form:first-child { margin-left: 0; }
    table.admin td.actions button {
      border: 0; background: transparent; padding: 0;
      color: var(--ink); text-decoration: underline;
      text-underline-offset: 0.2em; font: inherit;
      cursor: pointer;
    }
    table.admin td.actions button.danger { color: var(--accent); }
    table.admin td.actions button:hover { background: transparent; text-decoration-thickness: 2px; }
    .summary {
      display: flex; flex-wrap: wrap; gap: 0.4rem 1.5rem;
      margin: 0.6rem 0 1.5rem;
      font: 0.78rem/1 var(--font-mono); opacity: 0.65;
    }

    /* The one-time token reveal. */
    .token-box {
      margin: 1.25rem 0;
      padding: 1rem;
      border: 1px solid var(--hairline);
      background: #fff;
    }
    .token-box code {
      display: block;
      font-family: var(--font-mono); font-size: 0.9rem;
      word-break: break-all;
      user-select: all;
    }
    .token-meta dl {
      display: grid; grid-template-columns: auto 1fr;
      gap: 0.3rem 0.9rem;
      font-family: var(--font-mono); font-size: 0.78rem; opacity: 0.75;
      margin: 1rem 0 0;
    }
    .token-meta dt { opacity: 0.55; }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "topbar"}}
<header class="bar">
  <h1><a href="/">farfield · keys</a></h1>
  <nav>
    <a href="/new">New key</a>
    <a href="/logout">Log out</a>
  </nav>
</header>
{{end}}
