# Local-dev compose for the bookmarks app. Run from the repo root so Compose
# interpolates ${...} from the root .env:
#   docker compose -f apps/bookmarks/docker-compose.yml up --build
services:
  bookmarks:
    build:
      context: ../..
      dockerfile: apps/bookmarks/Dockerfile
    ports:
      - "${BOOKMARKS_PORT:-8793}:8793"
    environment:
      - HOST=0.0.0.0
      - BOOKMARKS_PORT=8793
      - BOOKMARKS_DB_PATH=/data/bookmarks.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - BOOKMARKS_API_KEY=${BOOKMARKS_API_KEY:-}
      - COOKIE_SECURE=false
    volumes:
      - bookmarks-data:/data
    restart: unless-stopped

volumes:
  bookmarks-data:
