{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · bookmarks{{end}}</title>
  <meta name="theme-color" content="#fafaf7">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    .container { max-width: 56rem; }

    /* the bookmarks table: every column visible, one row per bookmark */
    table.admin { font-size: 0.85rem; }
    table.admin td.url { max-width: 22rem; }
    table.admin td.url a {
      display: inline-block; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      vertical-align: bottom;
    }
    table.admin td.cat { font-family: var(--font-mono); font-size: 0.78rem; opacity: 0.7; }
    table.admin td { vertical-align: middle; }
    table.admin td.actions {
      display: table-cell; /* override the shared form .actions flex row */
      margin-top: 0;
      font: 0.78rem/1.3 var(--font-mono);
      white-space: nowrap;
      vertical-align: middle;
    }
    table.admin .action-row {
      display: inline-flex;
      gap: 0.6rem;
      flex-wrap: nowrap;
      align-items: baseline;
    }
    table.admin td.actions form { display: inline-flex; align-items: baseline; margin: 0; }
    table.admin td.actions a,
    table.admin td.actions button { line-height: 1; }
    table.admin td.actions button {
      border: 0; background: transparent; padding: 0;
      color: var(--ink); text-decoration: underline;
      text-underline-offset: 0.2em; font: inherit;
      cursor: pointer;
    }
    table.admin td.actions button.danger {
      color: var(--accent);
    }
    table.admin td.actions button:hover { background: transparent; text-decoration-thickness: 2px; }
    .summary {
      display: flex; flex-wrap: wrap; gap: 0.4rem 1.5rem;
      margin: 0.6rem 0 1.5rem;
      font: 0.78rem/1 var(--font-mono); opacity: 0.65;
    }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "topbar"}}
<header class="bar">
  <h1><a href="/">farfield · bookmarks</a></h1>
  <nav>
    <a href="/new">New bookmark</a>
    <a href="/logout">Log out</a>
  </nav>
</header>
{{end}}
