{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · bookmarks{{end}}</title>
  <meta name="theme-color" content="#fafaf7">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    .container { max-width: 56rem; }

    /* a public bookmark, grouped under a category header */
    .bookmarks { display: flex; flex-direction: column; gap: 1.5rem; }
    .category {
      display: flex; flex-direction: column; gap: 0.75rem;
      padding-top: 0.4rem;
    }
    .category-head {
      display: flex; justify-content: space-between; align-items: baseline;
      gap: 1rem; padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--hairline);
      font: 500 0.72rem/1 var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.09em;
    }
    .category-head span.count { opacity: 0.5; }
    .bookmark {
      display: grid; grid-template-columns: auto 1fr; gap: 0.5rem 0.9rem;
      padding: 0.6rem 0; border-bottom: 1px solid var(--hairline);
    }
    .bookmark:last-child { border-bottom: 0; }
    .bookmark .icon {
      width: 1.1rem; height: 1.1rem; margin-top: 0.25rem;
      object-fit: contain; opacity: 0.7;
    }
    .bookmark .icon-empty {
      width: 1.1rem; height: 1.1rem; margin-top: 0.25rem;
      border: 1px solid var(--hairline);
    }
    .bookmark h3 { font-size: 1rem; font-weight: 500; line-height: 1.3; }
    .bookmark h3 a { text-decoration: none; }
    .bookmark h3 a:hover { text-decoration: underline; text-underline-offset: 0.2em; }
    .bookmark p { font-size: 0.92rem; opacity: 0.8; margin-top: 0.2rem; }
    .bookmark .host {
      display: inline-block; margin-top: 0.3rem;
      font: 0.72rem/1 var(--font-mono); opacity: 0.55;
    }

    /* the admin table: every column visible, one row per bookmark */
    table.admin { font-size: 0.85rem; }
    table.admin td.url { max-width: 22rem; }
    table.admin td.url a {
      display: inline-block; max-width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      vertical-align: bottom;
    }
    table.admin td.cat { font-family: var(--font-mono); font-size: 0.78rem; opacity: 0.7; }
    table.admin td.actions {
      display: flex; gap: 0.6rem; flex-wrap: wrap;
      font: 0.78rem/1.3 var(--font-mono);
    }
    table.admin td.actions form { display: inline; margin: 0; }
    table.admin td.actions button {
      border: 0; background: transparent; padding: 0;
      color: var(--ink); text-decoration: underline;
      text-underline-offset: 0.2em; font: inherit;
      cursor: pointer;
    }
    table.admin td.actions button.danger {
      color: var(--accent);
    }
    table.admin td.actions button:hover { background: transparent; text-decoration-thickness: 2px; }
    .summary {
      display: flex; flex-wrap: wrap; gap: 0.4rem 1.5rem;
      margin-top: 0.6rem;
      font: 0.78rem/1 var(--font-mono); opacity: 0.65;
    }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "publicbar"}}
<header class="bar">
  <h1><a href="/">farfield · bookmarks</a></h1>
  <nav>
    <a href="/api/bookmarks">JSON</a>
  </nav>
</header>
{{end}}

{{define "adminbar"}}
<header class="bar">
  <h1><a href="/admin">farfield · bookmarks · admin</a></h1>
  <nav>
    <a href="/admin/new">New</a>
    <a href="/">Public</a>
    <a href="/admin/logout">Log out</a>
  </nav>
</header>
{{end}}
