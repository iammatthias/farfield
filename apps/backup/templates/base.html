{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · backup{{end}}</title>
  <meta name="theme-color" content="#121113">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .container { max-width: 58rem; }
    header.bar { display:flex; justify-content:space-between; align-items:baseline;
      gap:1rem 1.5rem; flex-wrap:wrap; margin-bottom:1.75rem;
      padding-bottom:1rem; border-bottom:1px solid var(--border); }
    header.bar h1 { font-size:1.05rem; margin:0; }
    header.bar h1 a { color:var(--text); text-decoration:none; }
    nav.links { display:flex; gap:1.25rem; flex-wrap:wrap; }
    .section-head { display:flex; justify-content:space-between; align-items:baseline;
      gap:1rem; margin:1.5rem 0 0.5rem; }
    .section-head h2 { font-size:0.95rem; margin:0; }
    .table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius); }
    table.rows { width:100%; border-collapse:collapse; font-size:0.9rem; }
    table.rows th, table.rows td { padding:0.55rem 0.85rem; text-align:left;
      border-bottom:1px solid var(--border); white-space:nowrap; }
    table.rows th { color:var(--muted); font-weight:600; font-size:0.72rem;
      text-transform:uppercase; letter-spacing:0.05em; }
    table.rows tbody tr:last-child td { border-bottom:0; }
    table.rows tbody tr:hover { background:var(--surface); }
    .cid { font-family:var(--mono); font-size:0.78rem; }
    .danger { background:transparent; color:var(--error); border-color:var(--error); }
    .field { margin:1rem 0; }
    .field label { display:block; color:var(--muted); font-size:0.85rem; margin-bottom:0.3rem; }
    .field input { width:100%; }
    .actions { display:flex; gap:1rem; align-items:center; margin-top:1.25rem; }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "topbar"}}
<header class="bar">
  <h1><a href="/">farfield · backup</a></h1>
  <nav class="links">
    <a href="/">Dashboard</a>
    <a href="/logout">Log out</a>
  </nav>
</header>
{{end}}
