# Local-dev compose for the library app. Run from the repo root so Compose
# interpolates ${...} from the root .env:
#   docker compose -f apps/library/docker-compose.yml up --build
services:
  library:
    build:
      context: ../..
      dockerfile: apps/library/Dockerfile
    ports:
      - "${LIBRARY_PORT:-8797}:8797"
    environment:
      - HOST=0.0.0.0
      - LIBRARY_PORT=8797
      - LIBRARY_DB_PATH=/data/library.sqlite
      - LIBRARY_BACKEND=${LIBRARY_BACKEND:-local}
      - LIBRARY_DIR=/data/library
      - PASSWORD=${PASSWORD:-changeme}
      - LIBRARY_API_KEY=${LIBRARY_API_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - COOKIE_SECURE=false
    volumes:
      - library-data:/data
    restart: unless-stopped

volumes:
  library-data:
