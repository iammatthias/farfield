{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · scrap{{end}}</title>
  <meta name="theme-color" content="#fafaf7">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    .container { max-width: 60rem; }

    .summary {
      display: flex; flex-wrap: wrap; gap: 0.4rem 1.5rem;
      margin: 0.6rem 0 1.5rem;
      font: 0.78rem/1 var(--font-mono); opacity: 0.65;
    }

    /* paste meta line under the title */
    .meta {
      display: flex; flex-wrap: wrap; gap: 0.3rem 1.1rem; align-items: baseline;
      margin-top: 0.4rem;
      font: 0.75rem/1.4 var(--font-mono); opacity: 0.65;
    }
    .meta .ttl { color: var(--accent); opacity: 1; }

    /* code view — the instrument readout */
    .code-wrap {
      margin-top: 1.25rem;
      border: 1px solid var(--ink);
      overflow-x: auto;
    }
    .code-wrap pre.chroma {
      margin: 0; padding: 0.9rem 1rem 0.9rem 0;
      background: var(--surface);
      font-size: 0.82rem; line-height: 1.55;
    }
    .chroma .line { display: block; width: 100%; }
    /* gutter: right-aligned numbers behind a hairline */
    .chroma .ln, .chroma .lnt {
      display: inline-block; min-width: 3.2ch;
      margin-right: 1ch; padding: 0 0.7ch 0 0.9ch;
      text-align: right;
      border-right: 1px solid var(--hairline);
      user-select: none;
    }
    .chroma .lnlinks { text-decoration: none; color: inherit; }
    /* #L10 single-line highlight (CSS only) + JS-applied range highlight */
    .chroma .line:target { background: #f7ebe3; }
    .chroma .line.hl { background: #f7ebe3; }
    .chroma .line:has([id]:target) { background: #f7ebe3; }

    /* link-shaped buttons in the masthead nav */
    button.linklike {
      border: 0; background: transparent; padding: 0;
      color: var(--ink); text-decoration: underline;
      text-underline-offset: 0.2em;
      font: inherit; cursor: pointer;
    }
    button.linklike:hover { background: transparent; color: var(--ink);
      text-decoration-thickness: 2px; }

    /* manage table */
    table.admin { font-size: 0.85rem; }
    table.admin td.id, table.admin td.lang, table.admin td.num {
      font-family: var(--font-mono); font-size: 0.78rem; opacity: 0.7;
    }
    table.admin td { vertical-align: middle; }
    table.admin td.title {
      max-width: 18rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    table.admin td.actions { white-space: nowrap; }
    table.admin td.actions form { display: inline-flex; margin: 0; }
    table.admin td.actions button {
      border: 0; background: transparent; padding: 0;
      color: var(--accent); text-decoration: underline;
      text-underline-offset: 0.2em; font: 0.78rem/1.3 var(--font-mono);
      cursor: pointer;
    }
    table.admin td.actions button:hover { background: transparent;
      text-decoration-thickness: 2px; }

    /* manage filter bar */
    form.filter-bar { align-items: center; }
    form.filter-bar select, form.filter-bar input[type="search"] {
      width: auto; padding: 0.25rem 0.45rem;
      font: 0.78rem var(--font-mono);
    }
    form.filter-bar button { padding: 0.25rem 0.8rem; font-size: 0.78rem; }

    /* locked shell */
    .locked { max-width: 26rem; margin: 3rem auto; }
    .locked h1 { font-size: 1.15rem; margin-top: 0.4rem; }

    /* compose */
    .compose textarea { min-height: 16rem; }
    .compose .controls {
      display: grid; gap: 0 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(min(11rem, 100%), 1fr));
    }
    .compose fieldset {
      border: 0; padding: 0; margin: 1.1rem 0 0;
    }
    .compose fieldset legend {
      padding: 0; margin-bottom: 0.3rem;
      font: 500 0.7rem/1 var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.09em; opacity: 0.6;
    }
    .compose .radio-row { display: flex; flex-wrap: wrap; gap: 0.35rem 1.1rem; }
    .compose .radio-row label {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "topbar"}}
<header class="bar">
  <h1><a href="/">farfield · scrap</a></h1>
  <nav>
    <a href="/">Compose</a>
    <a href="/manage">Manage</a>
    <a href="/pastes">Public</a>
    <a href="/logout">Log out</a>
  </nav>
</header>
{{end}}
