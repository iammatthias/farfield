# Local-dev compose for the calendar app. Run from the repo root so Compose
# interpolates ${...} from the root .env:
#   docker compose -f apps/calendar/docker-compose.yml up --build
services:
  calendar:
    build:
      context: ../..
      dockerfile: apps/calendar/Dockerfile
    ports:
      - "${CALENDAR_PORT:-8792}:8792"
    environment:
      - HOST=0.0.0.0
      - CALENDAR_PORT=8792
      - CALENDAR_DB_PATH=/data/calendar.sqlite
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}
    volumes:
      - calendar-data:/data
    restart: unless-stopped

volumes:
  calendar-data:
