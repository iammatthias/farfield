{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · qr{{end}}</title>
  <meta name="theme-color" content="#fafaf7">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    .container { max-width: 60rem; }

    table.admin { font-size: 0.85rem; }
    table.admin td.payload {
      max-width: 22rem;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-family: var(--font-mono); font-size: 0.78rem;
    }
    table.admin td.mode { font-family: var(--font-mono); font-size: 0.78rem; opacity: 0.7; }
    table.admin td.id { font-family: var(--font-mono); font-size: 0.78rem; opacity: 0.7; }
    table.admin td { vertical-align: middle; }
    table.admin td.actions {
      display: table-cell;
      margin-top: 0;
      font: 0.78rem/1.3 var(--font-mono);
      white-space: nowrap;
      vertical-align: middle;
    }
    table.admin .action-row {
      display: inline-flex;
      gap: 0.6rem;
      flex-wrap: nowrap;
      align-items: baseline;
    }
    table.admin td.actions form { display: inline-flex; align-items: baseline; margin: 0; }
    table.admin td.actions a,
    table.admin td.actions button { line-height: 1; }
    table.admin td.actions button {
      border: 0; background: transparent; padding: 0;
      color: var(--ink); text-decoration: underline;
      text-underline-offset: 0.2em; font: inherit;
      cursor: pointer;
    }
    table.admin td.actions button.danger { color: var(--accent); }
    table.admin td.actions button:hover { background: transparent; text-decoration-thickness: 2px; }
    .summary {
      display: flex; flex-wrap: wrap; gap: 0.4rem 1.5rem;
      margin: 0.6rem 0 1.5rem;
      font: 0.78rem/1 var(--font-mono); opacity: 0.65;
    }

    /* QR preview panel on the edit form. */
    .qr-panel {
      display: grid; gap: 1.25rem;
      grid-template-columns: minmax(0, 14rem) minmax(0, 1fr);
      align-items: start;
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--hairline);
    }
    .qr-panel figure { display: flex; flex-direction: column; gap: 0.5rem; }
    .qr-panel figure svg { width: 100%; height: auto; border: 1px solid var(--hairline); background: #fff; }
    .qr-panel figcaption { font: 0.72rem/1.3 var(--font-mono); opacity: 0.6; }
    .qr-meta dl {
      display: grid; grid-template-columns: auto 1fr;
      gap: 0.3rem 0.9rem;
      font-family: var(--font-mono); font-size: 0.78rem; opacity: 0.75;
      margin: 0;
    }
    .qr-meta dt { opacity: 0.55; }
    .qr-meta dd { word-break: break-all; }

    .endpoints {
      display: grid; gap: 0.45rem;
      margin: 0.75rem 0 0;
      font: 0.78rem/1.3 var(--font-mono);
    }
    .endpoints code { display: inline-block; padding: 0.1em 0.35em; word-break: break-all; }

    /* Checkbox rows: the label is body copy, not a field caption. */
    .field.check label {
      font: inherit;
      text-transform: none;
      letter-spacing: normal;
      opacity: 1;
      margin: 0;
    }

    @media (max-width: 40rem) {
      .qr-panel { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "topbar"}}
<header class="bar">
  <h1><a href="/">farfield · qr</a></h1>
  <nav>
    <a href="/new">New code</a>
    <a href="/logout">Log out</a>
  </nav>
</header>
{{end}}
