# Local-dev compose for the qr app. Run from the repo root so Compose
# interpolates ${...} from the root .env:
#   docker compose -f apps/qr/docker-compose.yml up --build
services:
  qr:
    build:
      context: ../..
      dockerfile: apps/qr/Dockerfile
    ports:
      - "${QR_PORT:-8794}:8794"
    environment:
      - HOST=0.0.0.0
      - QR_PORT=8794
      - QR_DB_PATH=/data/qr.sqlite
      - QR_API_KEY=${QR_API_KEY:-}
      - QR_PUBLIC_URL=${QR_PUBLIC_URL:-http://localhost:8794}
      - PASSWORD=${PASSWORD:-changeme}
      - COOKIE_SECURE=false
    volumes:
      - qr-data:/data
    restart: unless-stopped

volumes:
  qr-data:
