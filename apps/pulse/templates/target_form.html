{{define "title"}}{{if .IsNew}}New target{{else}}Edit target{{end}} · farfield pulse{{end}}
{{define "content"}}
  {{template "topbar" .}}
  <h2 style="font-size:1rem">{{if .IsNew}}New target{{else}}Edit target{{end}}</h2>
  {{with .Error}}<p class="error">{{.}}</p>{{end}}

  <form method="post" action="{{.Action}}" style="max-width:32rem">
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required autofocus value="{{.Target.Name}}">
    </div>
    <div class="field">
      <label for="url">URL</label>
      <input type="url" id="url" name="url" required value="{{.Target.URL}}"
             placeholder="https://example.farfield.systems/status">
    </div>
    <div class="field">
      <label for="method">Method</label>
      <input type="text" id="method" name="method" value="{{.Target.Method}}">
      <p class="hint">GET, HEAD, POST, … Defaults to GET.</p>
    </div>
    <div class="field">
      <label for="expected_status">Expected status</label>
      <input type="number" id="expected_status" name="expected_status" min="100" max="599"
             value="{{.Target.ExpectedStatus}}">
    </div>
    <div class="field">
      <label for="interval_s">Interval (seconds)</label>
      <input type="number" id="interval_s" name="interval_s" min="1"
             value="{{.Target.IntervalS}}">
    </div>
    <div class="field check">
      <input type="checkbox" id="enabled" name="enabled"{{if .Target.Enabled}} checked{{end}}>
      <label for="enabled" style="font:inherit;text-transform:none;letter-spacing:normal;opacity:1;margin:0">Enabled — probe this target on its interval</label>
    </div>

    <div class="actions">
      <button type="submit">{{if .IsNew}}Save{{else}}Save changes{{end}}</button>
      <a href="/targets">Cancel</a>
    </div>
  </form>
{{end}}
