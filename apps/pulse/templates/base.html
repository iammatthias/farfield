{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · pulse{{end}}</title>
  <meta name="theme-color" content="#fafaf7">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    .container { max-width: 64rem; }

    /* telemetry tables: mono numerals, tight rows */
    table.telemetry { font-size: 0.85rem; }
    table.telemetry td.num, table.telemetry th.num { text-align: right;
      font-family: var(--font-mono); font-size: 0.8rem; white-space: nowrap; }
    table.telemetry td.mono { font-family: var(--font-mono); font-size: 0.78rem; }
    table.telemetry td { vertical-align: middle; }
    table.telemetry td.actions { white-space: nowrap; font: 0.78rem/1.3 var(--font-mono); }
    table.telemetry td.actions form { display: inline; }
    table.telemetry td.actions button {
      border: 0; background: transparent; padding: 0;
      color: var(--accent); text-decoration: underline;
      text-underline-offset: 0.2em; font: inherit; cursor: pointer;
    }
    table.telemetry td.actions button:hover { background: transparent; text-decoration-thickness: 2px; }
    svg.spark { display: inline-block; vertical-align: middle; }
    svg.bars { width: 100%; height: 72px; border-bottom: 1px solid var(--hairline); }
    .err-text { color: var(--accent); font-family: var(--font-mono); font-size: 0.78rem; }
    .updown { font: 500 0.65rem/1 var(--font-mono); text-transform: uppercase;
      letter-spacing: 0.07em; padding: 0.22rem 0.45rem; border: 1px solid currentColor; }
    .updown.down { color: var(--accent); }
    .updown.up { opacity: 0.6; }

    /* the traffic filter form lines up as an instrument row */
    form.filters { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: end; }
    form.filters .field { margin: 0; }
    form.filters input, form.filters select { width: auto; }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}

{{define "topbar"}}
<header class="bar">
  <h1><a href="/">farfield · pulse</a></h1>
  <nav>
    <a href="/">Overview</a>
    <a href="/targets">Targets</a>
    <a href="/traffic">Traffic</a>
    <a href="/logout">Log out</a>
  </nav>
</header>
{{end}}
