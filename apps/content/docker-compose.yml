# Local-dev compose for the content app. Run from the repo root so Compose
# interpolates ${...} from the root .env:
#   docker compose -f apps/content/docker-compose.yml up --build
services:
  content:
    build:
      context: ../..
      dockerfile: apps/content/Dockerfile
    ports:
      - "${CONTENT_PORT:-8787}:8787"
    environment:
      - HOST=0.0.0.0
      - CONTENT_PORT=8787
      - CONTENT_DB_PATH=/data/content.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - CONTENT_API_KEY=${CONTENT_API_KEY:-}
      - COOKIE_SECURE=false
    volumes:
      - content-data:/data
    restart: unless-stopped

volumes:
  content-data:
