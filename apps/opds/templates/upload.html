{{define "title"}}Upload · farfield{{end}}
{{define "content"}}
  <section class="prose">
    <p><a href="/">← Books</a></p>
    <h1>Upload an EPUB</h1>
    {{with .Error}}<p class="error">{{.}}</p>{{end}}
    <form method="post" action="/upload" enctype="multipart/form-data">
      <label for="file">EPUB file</label>
      <input type="file" id="file" name="file" accept=".epub,application/epub+zip" required>
      <p class="hint">Title, author, language, and cover are read from the file.</p>
      <p><button type="submit">Upload</button></p>
    </form>
  </section>
{{end}}
