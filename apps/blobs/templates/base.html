{{define "base"}}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{block "title" .}}farfield · blobs{{end}}</title>
  <meta name="theme-color" content="#fafaf7">
  <link rel="stylesheet" href="/static/styles.css?v={{.AssetVer}}">
  <style>
    /* blobs admin — full-width, for the media table */
    .container { max-width: 86rem; }

    table.blobs td, table.blobs th { white-space: nowrap; }
    table.blobs td.shrink { width: 1%; }
    .thumb {
      width: 52px; height: 52px; max-width: none; object-fit: cover; display: block;
      border: 1px solid var(--hairline);
    }
    a.row { text-decoration: none; }
    a.row:hover { color: var(--accent); }
    .swatch {
      display: inline-block; width: 0.9rem; height: 0.9rem;
      vertical-align: -2px; border: 1px solid var(--hairline);
    }
    .pager {
      display: flex; gap: 1.5rem; justify-content: center; align-items: baseline;
      margin-top: 2rem; font-family: var(--font-mono); font-size: 0.8rem;
    }

    /* :target modal viewer — no JavaScript */
    .modal { display: none; position: fixed; inset: 0; z-index: 50; }
    .modal:target { display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .modal .backdrop { position: absolute; inset: 0; background: rgba(10, 10, 10, 0.55); }
    .modal .card {
      position: relative; z-index: 1; width: 100%; max-width: 58rem; max-height: 88vh;
      overflow: auto; background: var(--surface); border: 1px solid var(--ink);
      display: grid; grid-template-columns: minmax(0, 1fr) 19rem;
    }
    .modal .card > img {
      width: 100%; height: 100%; max-height: 88vh;
      object-fit: contain; background: var(--wash);
    }
    .modal .detail { padding: 1.25rem 1.4rem; min-width: 0; border-left: 1px solid var(--ink); }
    .modal .detail h2 {
      font: 500 0.8rem/1 var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.9rem;
    }
    .modal .detail dl {
      display: grid; grid-template-columns: auto minmax(0, 1fr);
      gap: 0.45rem 1rem; margin-bottom: 1.1rem; font-size: 0.85rem;
    }
    .modal .detail dt {
      font: 500 0.68rem/1.4 var(--font-mono);
      text-transform: uppercase; letter-spacing: 0.07em; opacity: 0.5;
    }
    .modal .detail dd { word-break: break-all; }
    .modal .close {
      position: absolute; top: 0; right: 0; z-index: 2;
      width: 2.1rem; height: 2.1rem;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; line-height: 1; text-decoration: none;
      color: var(--surface); background: var(--ink);
    }
    .modal .close:hover { background: var(--accent); }
    @media (max-width: 46rem) {
      .modal .card { grid-template-columns: 1fr; }
      .modal .card > img { max-height: 50vh; }
      .modal .detail { border-left: 0; border-top: 1px solid var(--ink); }
    }
  </style>
</head>
<body>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
</body>
</html>{{end}}
