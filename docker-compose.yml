# Production compose for farfield apps. Built from source on the host —
# `gnar-deploy farfield` runs `docker compose up -d --build` here.
#
# Every app builds from the single root Dockerfile (APP build arg) and shares
# a bind-mounted ./data directory (gitignored, host-side, so it survives
# rebuilds). Each app owns its own <app>.sqlite within it; the backup app
# reads them all. Secrets like ${PASSWORD} come from a .env beside this file.

x-defaults: &defaults
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  healthcheck:
    test: ["CMD", "/app", "health"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

services:
  blobs:
    <<: *defaults
    build:
      context: .
      args: { APP: blobs }
    image: farfield-blobs
    ports:
      - "${BLOBS_PORT:-8789}:8789"
    environment:
      - HOST=0.0.0.0
      - BLOBS_PORT=8789
      - BLOBS_DB_PATH=/data/blobs.sqlite
      - BLOBS_BACKEND=${BLOBS_BACKEND:-r2}
      - BLOBS_DIR=/data/blobs
      - PASSWORD=${PASSWORD:-changeme}
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  library:
    <<: *defaults
    build:
      context: .
      args: { APP: library }
    image: farfield-library
    ports:
      - "${LIBRARY_PORT:-8797}:8797"
    environment:
      - HOST=0.0.0.0
      - LIBRARY_PORT=8797
      - LIBRARY_DB_PATH=/data/library.sqlite
      - LIBRARY_BACKEND=${LIBRARY_BACKEND:-r2}
      - LIBRARY_DIR=/data/library
      - PASSWORD=${PASSWORD:-changeme}
      - LIBRARY_API_KEY=${LIBRARY_API_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  content:
    <<: *defaults
    build:
      context: .
      args: { APP: content }
    image: farfield-content
    depends_on:
      blobs:
        condition: service_healthy
    ports:
      - "${CONTENT_PORT:-8787}:8787"
    environment:
      - HOST=0.0.0.0
      - CONTENT_PORT=8787
      - CONTENT_DB_PATH=/data/content.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - CONTENT_API_KEY=${CONTENT_API_KEY:-}
      - BLOBS_URL=http://blobs:8789
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - BLOBS_PUBLIC_URL=${BLOBS_PUBLIC_URL:-https://blobs.farfield.systems}
      - CONTENT_PUBLIC_URL=${CONTENT_PUBLIC_URL:-https://content.farfield.systems}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  feed:
    <<: *defaults
    build:
      context: .
      args: { APP: feed }
    image: farfield-feed
    depends_on:
      blobs:
        condition: service_healthy
    ports:
      - "${FEED_PORT:-8788}:8788"
    environment:
      - HOST=0.0.0.0
      - FEED_PORT=8788
      - FEED_DB_PATH=/data/feed.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - FEED_API_KEY=${FEED_API_KEY:-}
      - BLOBS_URL=http://blobs:8789
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - CONTENT_URL=http://content:8787
      - CONTENT_API_KEY=${CONTENT_API_KEY:-}
      - BLOBS_PUBLIC_URL=${BLOBS_PUBLIC_URL:-https://blobs.farfield.systems}
      - CONTENT_PUBLIC_URL=${CONTENT_PUBLIC_URL:-https://content.farfield.systems}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  apex:
    <<: *defaults
    build:
      context: .
      args: { APP: apex }
    image: farfield-apex
    ports:
      - "${APEX_PORT:-8790}:8790"
    environment:
      - HOST=0.0.0.0
      - APEX_PORT=8790
      - APEX_DB_PATH=/data/apex.sqlite
    volumes:
      - ./data:/data

  bard:
    <<: *defaults
    build:
      context: .
      args: { APP: bard }
    image: farfield-bard
    ports:
      - "${BARD_PORT:-8795}:8795"
    environment:
      - HOST=0.0.0.0
      - BARD_PORT=8795
      - BARD_DB_PATH=/data/bard.sqlite
    volumes:
      - ./data:/data

  dead-presidents:
    <<: *defaults
    build:
      context: .
      args: { APP: dead-presidents }
    image: farfield-dead-presidents
    ports:
      - "${DEAD_PRESIDENTS_PORT:-8796}:8796"
    environment:
      - HOST=0.0.0.0
      - DEAD_PRESIDENTS_PORT=8796
      - DEAD_PRESIDENTS_DB_PATH=/data/dead-presidents.sqlite
    volumes:
      - ./data:/data

  pulse:
    <<: *defaults
    build:
      context: .
      args: { APP: pulse }
    image: farfield-pulse
    ports:
      - "${PULSE_PORT:-8798}:8798"
    environment:
      - HOST=0.0.0.0
      - PULSE_PORT=8798
      - PULSE_DB_PATH=/data/pulse.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  daily:
    <<: *defaults
    build:
      context: .
      args: { APP: daily }
    image: farfield-daily
    ports:
      - "${DAILY_PORT:-8792}:8792"
    environment:
      - HOST=0.0.0.0
      - DAILY_PORT=8792
      - DAILY_DB_PATH=/data/daily.sqlite
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}
    volumes:
      - ./data:/data

  bookmarks:
    <<: *defaults
    build:
      context: .
      args: { APP: bookmarks }
    image: farfield-bookmarks
    ports:
      - "${BOOKMARKS_PORT:-8793}:8793"
    environment:
      - HOST=0.0.0.0
      - BOOKMARKS_PORT=8793
      - BOOKMARKS_DB_PATH=/data/bookmarks.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - BOOKMARKS_API_KEY=${BOOKMARKS_API_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  qr:
    <<: *defaults
    build:
      context: .
      args: { APP: qr }
    image: farfield-qr
    ports:
      - "${QR_PORT:-8794}:8794"
    environment:
      - HOST=0.0.0.0
      - QR_PORT=8794
      - QR_DB_PATH=/data/qr.sqlite
      - QR_API_KEY=${QR_API_KEY:-}
      - QR_PUBLIC_URL=${QR_PUBLIC_URL:-https://qr.farfield.systems}
      - PASSWORD=${PASSWORD:-changeme}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  backup:
    <<: *defaults
    build:
      context: .
      args: { APP: backup }
    image: farfield-backup
    depends_on:
      blobs:
        condition: service_healthy
    ports:
      - "${BACKUP_PORT:-8791}:8791"
    environment:
      - HOST=0.0.0.0
      - BACKUP_PORT=8791
      - BACKUP_DB_PATH=/data/backup.sqlite
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-6h}
      - CONTENT_DB_PATH=/data/content.sqlite
      - FEED_DB_PATH=/data/feed.sqlite
      - BLOBS_DB_PATH=/data/blobs.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - BLOBS_URL=http://blobs:8789
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data
