# Production compose for farfield apps. Built from source on the host —
# `gnar-deploy farfield` runs `docker compose up -d --build` here.
#
# Every app shares a bind-mounted ./data directory (gitignored, host-side, so
# it survives rebuilds). Each app owns its own <app>.sqlite within it; the
# backup app reads them all. Secrets like ${PASSWORD} come from a .env beside
# this file.

services:
  blobs:
    build:
      context: .
      dockerfile: apps/blobs/Dockerfile
    image: farfield-blobs
    restart: unless-stopped
    ports:
      - "${BLOBS_PORT:-8789}:8789"
    environment:
      - HOST=0.0.0.0
      - BLOBS_PORT=8789
      - BLOBS_DB_PATH=/data/blobs.sqlite
      - BLOBS_BACKEND=${BLOBS_BACKEND:-r2}
      - BLOBS_DIR=/data/blobs
      - PASSWORD=${PASSWORD:-changeme}
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  content:
    build:
      context: .
      dockerfile: apps/content/Dockerfile
    image: farfield-content
    restart: unless-stopped
    ports:
      - "${CONTENT_PORT:-8787}:8787"
    environment:
      - HOST=0.0.0.0
      - CONTENT_PORT=8787
      - CONTENT_DB_PATH=/data/content.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - CONTENT_API_KEY=${CONTENT_API_KEY:-}
      - BLOBS_URL=http://blobs:8789
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - BLOBS_PUBLIC_URL=${BLOBS_PUBLIC_URL:-https://blobs.farfield.systems}
      - CONTENT_PUBLIC_URL=${CONTENT_PUBLIC_URL:-https://content.farfield.systems}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  feed:
    build:
      context: .
      dockerfile: apps/feed/Dockerfile
    image: farfield-feed
    restart: unless-stopped
    ports:
      - "${FEED_PORT:-8788}:8788"
    environment:
      - HOST=0.0.0.0
      - FEED_PORT=8788
      - FEED_DB_PATH=/data/feed.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - FEED_API_KEY=${FEED_API_KEY:-}
      - BLOBS_URL=http://blobs:8789
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - CONTENT_URL=http://content:8787
      - CONTENT_API_KEY=${CONTENT_API_KEY:-}
      - BLOBS_PUBLIC_URL=${BLOBS_PUBLIC_URL:-https://blobs.farfield.systems}
      - CONTENT_PUBLIC_URL=${CONTENT_PUBLIC_URL:-https://content.farfield.systems}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data

  apex:
    build:
      context: .
      dockerfile: apps/apex/Dockerfile
    image: farfield-apex
    restart: unless-stopped
    ports:
      - "${APEX_PORT:-8790}:8790"
    environment:
      - HOST=0.0.0.0
      - APEX_PORT=8790

  backup:
    build:
      context: .
      dockerfile: apps/backup/Dockerfile
    image: farfield-backup
    restart: unless-stopped
    ports:
      - "${BACKUP_PORT:-8791}:8791"
    environment:
      - HOST=0.0.0.0
      - BACKUP_PORT=8791
      - BACKUP_DB_PATH=/data/backup.sqlite
      - CONTENT_DB_PATH=/data/content.sqlite
      - FEED_DB_PATH=/data/feed.sqlite
      - BLOBS_DB_PATH=/data/blobs.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - BLOBS_URL=http://blobs:8789
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - ./data:/data
