# Production compose for farfield apps. Interpolates ${...} from the root .env.
# Add a service block per app as it is created — see
# .claude/skills/farfield-stack/SKILL.md, "Wiring up a new app".

services:
  blobs:
    image: ghcr.io/iammatthias/farfield/blobs:latest
    restart: unless-stopped
    ports:
      - "${BLOBS_PORT:-8789}:8789"
    environment:
      - HOST=0.0.0.0
      - BLOBS_PORT=8789
      - BLOBS_DB_PATH=/data/blobs.sqlite
      - BLOBS_BACKEND=${BLOBS_BACKEND:-r2}
      - BLOBS_DIR=/data/blobs
      - PASSWORD=${PASSWORD:-changeme}
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - blobs-data:/data

  content:
    image: ghcr.io/iammatthias/farfield/content:latest
    restart: unless-stopped
    ports:
      - "${CONTENT_PORT:-8787}:8787"
    environment:
      - HOST=0.0.0.0
      - CONTENT_PORT=8787
      - CONTENT_DB_PATH=/data/content.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - CONTENT_API_KEY=${CONTENT_API_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - content-data:/data

  feed:
    image: ghcr.io/iammatthias/farfield/feed:latest
    restart: unless-stopped
    ports:
      - "${FEED_PORT:-8788}:8788"
    environment:
      - HOST=0.0.0.0
      - FEED_PORT=8788
      - FEED_DB_PATH=/data/feed.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - FEED_API_KEY=${FEED_API_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - feed-data:/data

  apex:
    image: ghcr.io/iammatthias/farfield/apex:latest
    restart: unless-stopped
    ports:
      - "${APEX_PORT:-8790}:8790"
    environment:
      - HOST=0.0.0.0
      - APEX_PORT=8790

  # backup mounts every other app's data volume so it can snapshot their DBs.
  backup:
    image: ghcr.io/iammatthias/farfield/backup:latest
    restart: unless-stopped
    ports:
      - "${BACKUP_PORT:-8791}:8791"
    environment:
      - HOST=0.0.0.0
      - BACKUP_PORT=8791
      - BACKUP_DB_PATH=/data/backup.sqlite
      - PASSWORD=${PASSWORD:-changeme}
      - CONTENT_DB_PATH=/content/content.sqlite
      - FEED_DB_PATH=/feed/feed.sqlite
      - BLOBS_DB_PATH=/blobs/blobs.sqlite
      - BLOBS_URL=http://blobs:8789
      - BLOBS_API_KEY=${BLOBS_API_KEY:-}
      - COOKIE_SECURE=true
    volumes:
      - backup-data:/data
      - content-data:/content
      - feed-data:/feed
      - blobs-data:/blobs

volumes:
  blobs-data:
  content-data:
  feed-data:
  backup-data:
